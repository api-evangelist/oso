aid: oso
name: Oso Cloud
description: >-
  Oso Cloud is an authorization-as-a-service platform that provides a REST API
  for defining and enforcing relationship-based access control policies. It
  enables developers to model RBAC, ReBAC, and ABAC authorization patterns,
  manage authorization facts, and query permissions at runtime with sub-10ms
  latency and 99.99% availability.
