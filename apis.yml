apis:
  - name: Oso Cloud Authorization API
    description: >-
      The Oso Cloud Authorization API provides REST endpoints for checking
      permissions, managing authorization facts, querying policies, and
      enforcing access control across applications and services. Core operations
      include authorize (boolean permission check), list (get authorized
      resources), actions (get allowed actions), query, and batch fact
      management. The API uses the Polar policy language for defining
      authorization logic and supports context facts for request-time data.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
